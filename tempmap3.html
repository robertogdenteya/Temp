<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Teya Growth Map — Country Focus</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/d3@5/dist/d3.min.js"></script>
<script src="https://unpkg.com/d3-hexbin@0.2.2/build/d3-hexbin.min.js"></script>

<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
  :root { --blue:#008BB9; --lime:#E0E722; --ink:#111827; }
  html, body { height:100%; margin:0; background:#fff; }
  body { font:13px/1.45 'Inter', sans-serif; color:var(--ink); }
  #map { position:absolute; inset:0; }

  .hud { position:absolute; left:12px; top:12px; z-index:500; display:flex; gap:6px; }
  .toolbar {
    background: rgba(255,255,255,0.82); border:1px solid rgba(17,24,39,0.08);
    backdrop-filter: blur(6px); border-radius:10px; padding:6px 8px;
    display:flex; align-items:center; gap:8px;
  }
  select, .btn {
    padding:4px 8px; border:1px solid #d1d5db; border-radius:8px; background:#fff;
    height:26px; cursor:pointer; font:inherit;
  }
  .btn.primary { background:var(--blue); color:#fff; border-color:var(--blue); }
  .chip {
    position:absolute; left:12px; bottom:12px; z-index:500;
    background:rgba(255,255,255,0.82); border:1px solid rgba(17,24,39,0.08);
    border-radius:999px; padding:4px 8px;
  }
</style>
</head>

<body>
<div id="map"></div>

<div class="hud">
  <div class="toolbar">
    <button id="playBtn" class="btn primary">▶</button>
    <input id="qSlider" type="range" min="0" max="0" step="1" value="0" class="range" />
    <select id="modeSel">
      <option value="cum" selected>Cumulative</option>
      <option value="quarter">Quarter Only</option>
    </select>
    <select id="scaleSel">
      <option value="lime" selected>Lime</option>
      <option value="blue">Blue</option>
    </select>
    <select id="hexSize">
      <option value="2">Ludacris</option>
     <option value="5">Ultra Fine</option>
      <option value="7">Medium Fine</option>
      <option value="10">Fine</option>
      <option value="14" selected>Normal</option>
      <option value="18">Coarse</option>
    </select>

    <!-- Country focus selector (A3 codes) -->
    <select id="countrySel">
      <option value="">– Focus: All Countries –</option>
    </select>

    <button id="fitBtn" class="btn">Fit</button>
  </div>
</div>

<div class="chip"><span id="totalCount">0</span> merchants</div>

<script>
const CSV_PATH = "merchantmapoct25-dates.csv";
const COLS = {
  lat: "Latitude",
  lon: "Longitude",
  date: "START_OF_MERCHANT_REPORTING",
  country: "MERCHANT_COUNTRY"
};

const map = L.map('map').setView([55.5, -3], 5);

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png", {
  maxZoom: 19
}).addTo(map);

map.createPane("labels");
map.getPane("labels").style.zIndex = 650;
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png", {
  pane:"labels",
  maxZoom:19
}).addTo(map);

const leafletSvg = L.svg({padding:0.75}).addTo(map);
const svg = d3.select(leafletSvg._container);

// Two hex layers: base (all countries, faded) + focus (selected country, bright)
const gRoot = svg.append("g").attr("class","hex-root");
const gBase = gRoot.append("g").attr("class","hex-base");
const gFocus = gRoot.append("g").attr("class","hex-focus");

let points=[], quarters=[], qEnd={};
let playTimer=null;

const slider=document.getElementById("qSlider");
const playBtn=document.getElementById("playBtn");
const modeSel=document.getElementById("modeSel");
const scaleSel=document.getElementById("scaleSel");
const hexSize=document.getElementById("hexSize");
const fitBtn=document.getElementById("fitBtn");
const countrySel=document.getElementById("countrySel");
const totalCountEl=document.getElementById("totalCount");

let highlightedCountry = "";

function qKey(d){ return `${d.getFullYear()}-Q${Math.floor(d.getMonth()/3)+1}`; }

/* ===== RENDER HEXES (base + focus) ===== */
function renderHexes(pts){
  gBase.selectAll("path.hex-base").remove();
  gFocus.selectAll("path.hex-focus").remove();
  if(!pts.length) return;

  const projectedAll = pts.map(p=>{
    const pt = map.latLngToLayerPoint([p.lat,p.lon]);
    return {x:pt.x, y:pt.y, country:p.country};
  });

  const radius = parseInt(hexSize.value)||14;
  const hexbin = d3.hexbin().radius(radius).x(d=>d.x).y(d=>d.y);
  const binsAll = hexbin(projectedAll);

  let maxCount = d3.max(binsAll,b=>b.length)||1;
  if(maxCount<3) maxCount=3;

  const baseColor = (scaleSel.value==='blue')
    ? d3.scaleSequential(d3.interpolateGnBu).domain([0,maxCount])
    : d3.scaleLinear().domain([0,maxCount*0.5,maxCount])
      .range(['#edf0ba','#e4ea76','#E0E722']).clamp(true);

  const focusColor = (scaleSel.value==='blue')
    ? d3.scaleSequential(d3.interpolateBuGn).domain([0,maxCount])
    : d3.scaleLinear().domain([0,maxCount*0.5,maxCount])
      .range(['#E4E66D','#D4D72C','#C0C42D']).clamp(true);

  // Base layer = all bins, faded
  gBase.selectAll("path.hex-base")
    .data(binsAll, d=>d.x+"-"+d.y)
    .enter().append("path")
      .attr("class","hex-base")
      .attr("transform", d=>`translate(${d.x},${d.y})`)
      .attr("d", hexbin.hexagon())
      .attr("fill", d=>baseColor(d.length))
      .attr("stroke","#fff")
      .attr("stroke-width",0.4)
      .attr("fill-opacity", highlightedCountry ? 0.25 : 0.9); // fade if focusing

  // Focus layer = only bins that contain at least one point in the selected country
  if (highlightedCountry) {
    // Map of bin key → count for focus points
    const focusPoints = projectedAll.filter(p=>p.country===highlightedCountry);
    if (focusPoints.length) {
      const binsFocus = hexbin(focusPoints);
      gFocus.selectAll("path.hex-focus")
        .data(binsFocus, d=>d.x+"-"+d.y)
        .enter().append("path")
          .attr("class","hex-focus")
          .attr("transform", d=>`translate(${d.x},${d.y})`)
          .attr("d", hexbin.hexagon())
          .attr("fill", d=>focusColor(d.length))
          .attr("stroke","#111827")
          .attr("stroke-width",0.6)
          .attr("fill-opacity",0.95);
    }
  }
}

/* ===== MAIN VIEW UPDATE ===== */
function setView(idx){
  if(!quarters.length) return;
  const q=quarters[idx];
  const end=qEnd[q]??-1;
  let slicePoints=[];
  if(end<0){ renderHexes([]); return; }

  if(modeSel.value==='cum'){
    slicePoints = points.slice(0,end+1);
  } else {
    const prev = idx>0 ? (qEnd[quarters[idx-1]]??-1) : -1;
    slicePoints = points.slice(prev+1,end+1);
  }

  renderHexes(slicePoints);

  totalCountEl.textContent = (modeSel.value==='cum'
    ? (end+1)
    : slicePoints.length
  ).toLocaleString();
}

/* ===== FIT MAP ===== */
function fit(){
  if(!points.length) return;
  const lats=points.map(p=>p.lat), lons=points.map(p=>p.lon);
  map.fitBounds([[Math.min(...lats),Math.min(...lons)],
                 [Math.max(...lats),Math.max(...lons)]],
                 {padding:[24,24]});
}

/* ===== EVENTS ===== */
slider.addEventListener("input",()=>setView(+slider.value));
modeSel.addEventListener("change",()=>setView(+slider.value));
scaleSel.addEventListener("change",()=>setView(+slider.value));
hexSize.addEventListener("change",()=>setView(+slider.value));
fitBtn.addEventListener("click",fit);

countrySel.addEventListener("change",e=>{
  highlightedCountry = e.target.value; // A3 code
  setView(+slider.value);
});

map.on("move zoom moveend zoomend",()=>setView(+slider.value));

playBtn.addEventListener("click",()=>{
  if(playTimer){ clearInterval(playTimer); playTimer=null; playBtn.textContent="▶"; return; }
  playBtn.textContent="⏸";
  playTimer=setInterval(()=>{
    let i=+slider.value;
    if(i>=+slider.max){ clearInterval(playTimer); playTimer=null; playBtn.textContent="▶"; return; }
    slider.value=i+1;
    slider.dispatchEvent(new Event('input'));
  },150); // playback speed
});

/* ===== CSV LOAD WITH ROBUST HEADER HANDLING ===== */
(async function(){
  const res = await fetch(CSV_PATH+"?t="+Date.now());
  const text = await res.text();
  const parsed = Papa.parse(text,{header:true,skipEmptyLines:true});

  const metaFields = parsed.meta?.fields || [];
  const fieldMap = {};
  metaFields.forEach(f=>{
    if(!f) return;
    const clean = f.replace(/^\uFEFF/,"").trim();
    fieldMap[clean] = f;
  });

  console.log("CSV headers (clean → raw):", fieldMap);

  function getVal(row, logical){
    const raw = fieldMap[logical];
    return raw ? row[raw] : undefined;
  }

  const rows=[];
  const countries=new Set();

  for(const r of parsed.data){
    const lat=parseFloat(getVal(r, COLS.lat));
    const lon=parseFloat(getVal(r, COLS.lon));
    if(!isFinite(lat)||!isFinite(lon)) continue;

    const dRaw = getVal(r, COLS.date);
    const d=new Date(dRaw);
    if(isNaN(d)) continue;

    const c=(getVal(r, COLS.country) || "").toString().trim();
    if(c) countries.add(c);

    rows.push({lat,lon,date:d,q:qKey(d),country:c});
  }

  console.log("Distinct countries found:", Array.from(countries).sort());
  console.log("Total usable rows:", rows.length);

  rows.sort((a,b)=>a.date-b.date);
  points=rows;
  totalCountEl.textContent = points.length.toLocaleString();

  // populate selector with A3 codes as-is
  [...countries].sort().forEach(c=>{
    const opt=document.createElement("option");
    opt.value=c;
    opt.textContent=c;
    countrySel.appendChild(opt);
  });

  if(!rows.length){
    console.warn("No usable rows found. Check column names/values.");
    return;
  }

  // build quarter index
  const startQ = qKey(rows[0].date);
  const now = new Date();
  const endQ = qKey(now);

  quarters=[];
  let parts = startQ.split("-Q");
  let y = parseInt(parts[0],10);
  let q = parseInt(parts[1],10);

  while(true){
    const label = `${y}-Q${q}`;
    quarters.push(label);
    if(label===endQ) break;
    q++; if(q>4){ q=1; y++; }
  }

  let j=0; qEnd={};
  for(const Q of quarters){
    while(j<rows.length && rows[j].q<=Q) j++;
    qEnd[Q]=j-1;
  }

  slider.min=0;
  slider.max=quarters.length-1;
  slider.value=slider.max;

  setView(+slider.value);
  fit();
})();
</script>
</body>
</html>
